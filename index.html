const lerp=(a,b,t)=>a+(b-a)*Math.min(1,Math.max(0,t));
const lC=(a,b,t)=>a.map((v,i)=>Math.round(lerp(v,b[i],t)));
const rgb=c=>`rgb(${c[0]},${c[1]},${c[2]})`;
const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;
const pCol=p=>lC([45,155,238],[192,55,18],p/100);
const zI=d=>{for(let i=ZONES.length-1;i>=0;i--)if(d>=ZONES[i].at)return i;return 0;};
const bgC=d=>{const zi=zI(d);if(zi>=ZONES.length-1)return ZONES[zi];const z0=ZONES[zi],z1=ZONES[zi+1],t=(d-z0.at)/(z1.at-z0.at);return{t:lC(z0.t,z1.t,t),b:lC(z0.b,z1.b,t)};};
const nowT=()=>performance.now();

const fmtDate=iso=>{const d=new Date(iso);return`${d.getDate()}.${d.getMonth()+1}.${String(d.getFullYear()).slice(2)}`;};

const UI_IDS=["eb","nsb","scores-btn","scores-btn2","back-btn","polar-btn"];
function isUITarget(e){let el=e.target;while(el&&el!==root){if(el.id&&UI_IDS.includes(el.id))return true;if(el.dataset&&el.dataset.t)return true;el=el.parentElement;}return false;}

const polar={connected:false,device:null,status:"disconnected"};
// Detection — dual-path with personal calibration
// Holds are post-EXHALE: hold ends with an INHALE (RR shortens, HR accelerates)
// Baseline thresholds — overridden after calibration
const CV_WINDOW=4;
const REFRACTORY_MS=1200;
let CV_HOLD_THR=0.016, FAST_START_DIFF=10, DIFF_THR=22, RMSSD_BREATHE_THR=14;
let rrBuf=[],polarHoldState=false,prevRR=null,lastEndT=0;

// Calibration state
let calBuf=[],calDone=false,calPhase=0,calT0=0;
const CAL_PHASE1=25000; // ms of quiet breathing to measure baseline

function rmssd(arr){
  if(arr.length<2)return 0;
  let sum=0;for(let i=1;i<arr.length;i++)sum+=(arr[i]-arr[i-1])**2;
  return Math.sqrt(sum/(arr.length-1));
}

function polarHandleRR(ms){
  rrBuf.push(ms);if(rrBuf.length>CV_WINDOW+2)rrBuf.shift();
  const bpm=Math.round(60000/ms);
  const hel=document.getElementById("polar-hr");if(hel)hel.textContent=bpm+" bpm";
  const diff=prevRR!==null?Math.abs(ms-prevRR):999;

  // Feed calibration buffer during phase 1
  if(!calDone&&calPhase===1){
    calBuf.push({ms,diff:prevRR!==null?diff:null,t:nowT()});
    updateCalUI();
    if(nowT()-calT0>CAL_PHASE1) finishCalibration();
  }

  if(!calDone){prevRR=ms;return;} // don't detect holds until calibrated

  // Hold START (post-exhale: RSA disappears as breath is held after full exhale)
  // Only auto-detect if we haven't just manually triggered via touch
  if(!polarHoldState&&!gs.holding&&(nowT()-lastEndT)>REFRACTORY_MS){
    const fastStart=diff<FAST_START_DIFF;
    let cvStart=false;
    if(rrBuf.length>=CV_WINDOW){
      const w=rrBuf.slice(-CV_WINDOW),mean=w.reduce((a,b)=>a+b,0)/w.length;
      const sd=Math.sqrt(w.reduce((s,v)=>s+(v-mean)**2,0)/w.length);
      cvStart=(sd/mean)<CV_HOLD_THR;
    }
    if(fastStart||cvStart){polarHoldState=true;startHold();}
  }

  // Hold END: inhale after post-exhale hold = RR shortens (HR accelerates)
  // Only auto-end if we haven't already manually ended via touch
  if(polarHoldState&&gs.holding){
    const rm=rrBuf.length>=RMSSD_WINDOW?rmssd(rrBuf.slice(-RMSSD_WINDOW)):0;
    if(diff>DIFF_THR||rm>RMSSD_BREATHE_THR){
      polarHoldState=false;lastEndT=nowT();endHold();
    }
  }
  prevRR=ms;
}

function finishCalibration(){
  // Compute personal thresholds from quiet-breathing baseline
  const diffs=calBuf.map(b=>b.diff).filter(d=>d!==null&&d<300);
  const rrs=calBuf.map(b=>b.ms).filter(r=>r>300&&r<2000);
  if(diffs.length<20||rrs.length<20){updateCalUI('retry');return;}

  const meanDiff=diffs.reduce((a,b)=>a+b,0)/diffs.length;
  const sdDiff=Math.sqrt(diffs.reduce((s,v)=>s+(v-meanDiff)**2,0)/diffs.length);
  const meanRR=rrs.reduce((a,b)=>a+b,0)/rrs.length;
  // CV of baseline
  const sdRR=Math.sqrt(rrs.reduce((s,v)=>s+(v-meanRR)**2,0)/rrs.length);
  const baseCv=sdRR/meanRR;

  // Thresholds: hold CV = ~40% of rest CV; diff threshold = 2x baseline mean diff
  // For low-HRV profiles (post-exhale holds): use conservative values
  CV_HOLD_THR=Math.max(0.008, Math.min(0.020, baseCv*0.45));
  DIFF_THR=Math.max(18, Math.min(60, Math.round(meanDiff*2.0+sdDiff)));
  FAST_START_DIFF=Math.max(8, Math.min(18, Math.round(meanDiff*0.5)));
  RMSSD_BREATHE_THR=Math.max(12, Math.min(28, Math.round(meanDiff*1.4)));

  calDone=true;
  console.log(`Cal: baseCv=${baseCv.toFixed(4)} meanDiff=${meanDiff.toFixed(1)}ms → CV_THR=${CV_HOLD_THR.toFixed(4)} DIFF_THR=${DIFF_THR}ms FAST=${FAST_START_DIFF}ms`);
  renderCalDone();
}

function updateCalUI(state){
  const el=document.getElementById('cal-status');
  if(!el)return;
  const pct=Math.min(100,Math.round((nowT()-calT0)/CAL_PHASE1*100));
  if(state==='retry'){
    el.textContent='Te weinig data — adem nog even rustig...';
    calBuf=[];calT0=nowT();
    return;
  }
  el.textContent=`Meten... ${pct}%`;
  const bar=document.getElementById('cal-bar');
  if(bar)bar.style.width=pct+'%';
}

function renderCalibration(){

    <h2 style="font-size:28px;font-weight:100;color:rgba(255,255,255,.88);letter-spacing:2px;margin-bottom:10px;">Kalibratie</h2>
    <p style="font-size:15px;color:#3a6888;line-height:1.9;margin-bottom:8px;">Adem rustig en ontspannen.<br>Denk niet aan je ademhaling.</p>
    <p style="font-size:13px;color:#2a4a5a;margin-bottom:28px;">De app leert je hartslagpatroon kennen.</p>
    <div style="width:100%;max-width:260px;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-bottom:12px;overflow:hidden;">
      <div id="cal-bar" style="height:100%;width:0%;background:#3a8ab5;border-radius:2px;transition:width .3s linear;"></div>
    </div>
    <p id="cal-status" style="font-size:13px;color:rgba(60,120,160,.6);letter-spacing:1px;">Meten... 0%</p>
    <div style="margin-top:24px;padding:14px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;max-width:280px;">
      <p style="font-size:12px;color:#2a5878;line-height:1.8;">Houd vast na een <span style="color:rgba(120,200,255,.7);">volledige uitademing</span>.<br>Laat los bij de eerste <span style="color:rgba(120,200,255,.7);">inademing</span>.</p>
    </div>
    ${polar.connected?`<div style="position:absolute;top:16px;right:18px;font-size:10px;color:rgba(38,200,130,.5);" id="polar-hr"></div>`:''}
  </div>`;
  calBuf=[];calT0=nowT();calPhase=1;
}

function renderCalDone(){
  const hrEl=document.getElementById('polar-hr');
  const hrText=hrEl?hrEl.textContent:'';
  root.innerHTML=`
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,#05101e,#020a16);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;text-align:center;">
    <p style="font-size:11px;letter-spacing:5px;color:#2a4a62;text-transform:uppercase;margin-bottom:16px;">Kalibratie voltooid</p>
    <div style="font-size:44px;margin-bottom:10px;">&#x2713;</div>
    <h2 style="font-size:22px;font-weight:100;color:rgba(255,255,255,.88);margin-bottom:18px;">Klaar om te duiken</h2>
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 20px;max-width:280px;margin-bottom:26px;">
      <p style="font-size:12px;color:#3a6888;line-height:2;">Detectiedrempels afgesteld<br>
      <span style="color:rgba(100,180,220,.6);font-size:11px;">CV drempel: ${CV_HOLD_THR.toFixed(4)} &nbsp; Sprong: ${DIFF_THR}ms</span></p>
    </div>

      <p style="font-size:13px;color:rgba(100,200,140,.7);line-height:1.9;">Adem volledig <strong style="color:rgba(120,220,160,.85);">uit</strong><br>Houd vast &rarr; duiker daalt<br>Eerste <strong style="color:rgba(120,220,160,.85);">inademing</strong> &rarr; duiker stijgt</p>
    </div>
    <button id="start-btn" style="padding:13px 32px;background:rgba(58,138,181,.18);border:1px solid rgba(74,138,181,.45);border-radius:8px;color:#5a9ac5;font-size:13px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;font-family:inherit;">Starten</button>
    ${polar.connected?`<div style="position:absolute;top:16px;right:18px;font-size:10px;color:rgba(38,200,130,.5);">${hrText}</div>`:''}
  </div>`;
  const sb=document.getElementById('start-btn');
  if(sb)sb.addEventListener('click',()=>renderReady());
}
function parsePolarHR(data){
  const flags=data.getUint8(0);let offset=(flags&1)?3:2;if(!(flags&16))return;
  while(offset+1<data.byteLength){const rr=data.getUint16(offset,true)/1024*1000;if(rr>300&&rr<2000)polarHandleRR(rr);offset+=2;}
}
async function connectPolar(){
  if(polar.status==="connecting")return;
  polar.status="connecting";updatePolarUI();
  try{
    const dev=await navigator.bluetooth.requestDevice({
      filters:[{services:["heart_rate"]},{namePrefix:"Polar"}],
      optionalServices:["heart_rate"],
    });
    polar.device=dev;
    const srv=await dev.gatt.connect();
    const svc=await srv.getPrimaryService("heart_rate");
    const chr=await svc.getCharacteristic("heart_rate_measurement");
    chr.addEventListener("characteristicvaluechanged",e=>parsePolarHR(e.target.value));
    await chr.startNotifications();
    polar.connected=true;polar.status="connected";
    dev.addEventListener("gattserverdisconnected",()=>{polar.connected=false;polar.status="disconnected";polarHoldState=false;calDone=false;renderReady();});
    // Start calibration instead of returning to ready screen
    renderCalibration();
  }catch(e){
    polar.status=e.name==="NotFoundError"?"disconnected":"error";
    updatePolarUI();console.warn("Polar:",e.message);
  }
}
function updatePolarUI(){
  const btn=document.getElementById("polar-btn"),lbl=document.getElementById("polar-lbl");if(!btn||!lbl)return;
  const ST={connected:{bc:"rgba(38,220,140,.5)",c:"rgba(38,220,140,.85)",t:"Polar verbonden \u2665"},connecting:{bc:"rgba(255,200,60,.4)",c:"rgba(255,200,60,.7)",t:"Verbinden..."},error:{bc:"rgba(255,80,60,.4)",c:"rgba(255,80,60,.6)",t:"Verbinding mislukt \u2014 opnieuw"},disconnected:{bc:"rgba(74,138,181,.3)",c:"rgba(74,138,181,.5)",t:"Polar H10 verbinden"}};
  const st=ST[polar.status]||ST.disconnected;btn.style.borderColor=st.bc;btn.style.color=st.c;lbl.textContent=st.t;
}

let sessions=loadS(),timeLimit=5*60,screen="ready";
let prevBest=sessions.length?Math.max(...sessions.map(s=>s.maxDepth)):0;
const gs={active:false,holding:false,depth:0,maxDepth:0,pressure:0,holdStart:null,releaseStart:null,smallBreaths:0,bigBreaths:0,holdTimes:[],sessionStart:null,lastTs:null,ambient:[],bubbles:[],effects:[],texts:[],sightings:[],passed:new Set(),sightingDone:false};
let isHolding=false,finalStats=null,rafId=null;
const root=document.getElementById("root");

function effectivePR(){const r=gs.holdTimes.slice(-5);if(!r.length)return BASE_PR;return BASE_PR*Math.max(0.60,1-r.reduce((a,b)=>a+b,0)/r.length*0.014);}
function descentSpd(){if(!gs.holdStart)return DESCENT_BASE;return DESCENT_BASE+Math.min((nowT()-gs.holdStart)/1000*DESCENT_ACC,DESCENT_MAX_BONUS);}
function ascentSpd(){if(!gs.releaseStart)return ASCENT_SLOW;return ASCENT_SLOW+ASCENT_FAST*Math.exp(-(nowT()-gs.releaseStart)/1000*ASCENT_DECAY);}
function diverGlowCol(dt){if(dt<0.5)return lC([65,150,255],[38,220,185],dt*2);return lC([38,220,185],[200,255,230],(dt-0.5)*2);}

function triggerSighting(w,h){
  if(gs.sightingDone)return;gs.sightingDone=true;
  const types=["whale","manta","serpent"],type=types[Math.floor(Math.random()*types.length)];
  gs.sightings.push({t0:nowT(),dur:6500,fromRight:Math.random()>.5,type,y:h*(0.32+Math.random()*.28)});
  gs.texts.push({depth:"",msg:SIGHTING_MSGS[Math.floor(Math.random()*SIGHTING_MSGS.length)],col:[180,220,255],t0:nowT()+1200,dur:4000});
}

function drawSightings(ctx,w,h){
  const n=nowT();gs.sightings=gs.sightings.filter(s=>{
    const el=(n-s.t0)/1000,pr=el/(s.dur/1000);if(pr>=1)return false;
    let a=pr<.15?pr/.15:pr<.75?1:1-(pr-.75)/.25;a*=0.26;
    const x=s.fromRight?w+200-pr*(w+500):-200+pr*(w+500);
    ctx.save();ctx.globalAlpha=a;ctx.translate(x,s.y);if(s.fromRight)ctx.scale(-1,1);
    ctx.fillStyle="rgba(20,70,150,1)";
    if(s.type==="whale"){
      ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(80,-30,200,-25,280,-5);ctx.bezierCurveTo(320,5,340,10,360,0);ctx.bezierCurveTo(350,15,330,20,310,18);ctx.bezierCurveTo(260,28,160,22,60,18);ctx.bezierCurveTo(20,14,0,10,0,0);ctx.fill();
      ctx.beginPath();ctx.moveTo(120,-5);ctx.bezierCurveTo(140,-55,170,-60,180,-20);ctx.bezierCurveTo(165,-10,140,-5,120,-5);ctx.fill();
    }else if(s.type==="manta"){
      ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-80,-60,-200,-80,-280,-20);ctx.bezierCurveTo(-250,10,-200,20,-140,15);ctx.bezierCurveTo(-80,10,-30,5,0,0);ctx.bezierCurveTo(30,5,80,10,140,15);ctx.bezierCurveTo(200,20,250,10,280,-20);ctx.bezierCurveTo(200,-80,80,-60,0,0);ctx.fill();
    }else{
      ctx.beginPath();for(let i=0;i<=8;i++){const sx=i*55,sy=Math.sin(i*.9+pr*6)*18;i===0?ctx.moveTo(sx,sy-8):ctx.bezierCurveTo(sx-30,sy-8,sx-20,sy-8,sx,sy-8);}for(let i=8;i>=0;i--){const sx=i*55,sy=Math.sin(i*.9+pr*6)*18;ctx.bezierCurveTo(sx+20,sy+8,sx+30,sy+8,sx,sy+8);}ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.ellipse(0,Math.sin(pr*6)*18,18,12,0,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();return true;
  });
}

function drawBg(ctx,w,h,d){
  const{t,b}=bgC(d);const gr=ctx.createLinearGradient(0,0,0,h);gr.addColorStop(0,rgb(t));gr.addColorStop(1,rgb(b));ctx.fillStyle=gr;ctx.fillRect(0,0,w,h);
  if(d<65){const sf=Math.max(0,1-d/65);const sg=ctx.createLinearGradient(0,0,0,h*.45);sg.addColorStop(0,`rgba(220,248,255,${sf*.85})`);sg.addColorStop(.35,`rgba(160,220,255,${sf*.45})`);sg.addColorStop(.7,`rgba(80,160,240,${sf*.18})`);sg.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=sg;ctx.fillRect(0,0,w,h*.45);}
  if(d<12){const rf=Math.max(0,1-d/12);ctx.save();ctx.globalAlpha=rf*.22;for(let i=0;i<5;i++){const ry=i*8+3+Math.sin(nowT()*.0008+i*1.2)*3;ctx.beginPath();ctx.moveTo(0,ry);ctx.bezierCurveTo(w*.25,ry-3,w*.75,ry+3,w,ry);ctx.strokeStyle="rgba(255,255,255,.8)";ctx.lineWidth=1.2;ctx.stroke();}ctx.restore();}
}
function drawRays(ctx,w,h,d){
  if(d>60)return;const fade=Math.max(0,1-d/60),a=fade*.07;

  const cv=document.getElementById("gc");if(cv&&gs.depth>prevBest&&prevBest>10&&!gs.sightingDone)triggerSighting(cv.width,cv.height);
  gs.bubbles=gs.bubbles.map(b=>({...b,x:b.x+b.vx*dt,y:b.y+b.vy*dt,opacity:b.opacity-dt*.3})).filter(b=>b.opacity>.01);
  if(cv){checkMS(prev,gs.depth,cv);updAmb(dt,gs.depth,cv);draw(cv,ts);}
  const dn=document.getElementById("dn");if(dn)dn.textContent=Math.round(gs.depth);
  const mx=document.getElementById("mx");if(mx)mx.textContent="max "+Math.round(gs.maxDepth)+"m";
  const pf=document.getElementById("pf");if(pf){const pc=pCol(gs.pressure);pf.style.height=Math.round(gs.pressure)+"%";pf.style.background=rgb(pc);}
  const pl=document.getElementById("pl");if(pl){const pr=effectivePR()/BASE_PR,ad=1-pr,r=Math.round(lerp(68,38,ad)),g=Math.round(lerp(128,188,ad)),bl=Math.round(lerp(168,128,ad));pl.style.color=`rgba(${r},${g},${bl},${lerp(.3,.55,ad)})`;}
  const sl=document.getElementById("sl");if(sl){sl.style.color=isHolding?"rgba(135,205,255,.65)":"rgba(200,120,70,.5)";sl.textContent=polar.connected?(isHolding?"vasthouden \u2665":"inademen \u2665"):isHolding?"vasthouden":"inademen";}
  const rem=Math.max(0,timeLimit-(ts-gs.sessionStart)/1000);
  const tm=document.getElementById("tm");if(tm){tm.textContent=`${Math.floor(rem/60)}:${Math.floor(rem%60).toString().padStart(2,"0")}`;tm.style.color=rem<30?"rgba(255,110,70,.9)":"rgba(255,255,255,.3)";}
  if(rem<=0){endSession();return;}
  rafId=requestAnimationFrame(loop);
}

function startHold(){
  if(screen==="complete")return;
  if(!gs.active){
    gs.active=true;screen="playing";gs.sessionStart=nowT();gs.lastTs=null;
    renderPlaying();
    setTimeout(()=>{const c=document.getElementById("gc");if(c){c.width=c.offsetWidth;c.height=c.offsetHeight;}rafId=requestAnimationFrame(loop);},20);
    // If Polar triggered this, the hold is already active — set it immediately
    if(polar.connected&&polarHoldState){
      gs.holding=true;gs.holdStart=nowT();isHolding=true;
    }
    return;
  }
  if(!gs.holding){
    if(gs.releaseStart){const rd=(nowT()-gs.releaseStart)/1000;if(rd<STHR)gs.smallBreaths++;else gs.bigBreaths++;gs.releaseStart=null;}
    gs.holding=true;gs.holdStart=nowT();isHolding=true;
  }
}
function endHold(){if(!gs.holding)return;gs.holding=false;isHolding=false;if(gs.holdStart){gs.holdTimes.push((nowT()-gs.holdStart)/1000);gs.holdStart=null;}gs.releaseStart=nowT();}
function endSession(){
  if(!gs.active)return;gs.active=false;gs.holding=false;isHolding=false;if(rafId)cancelAnimationFrame(rafId);
  if(gs.releaseStart){const rd=(nowT()-gs.releaseStart)/1000;if(rd<STHR)gs.smallBreaths++;else gs.bigBreaths++;}
  const dur=Math.round((nowT()-(gs.sessionStart||nowT()))/1000);const ht=gs.holdTimes,avg=ht.length?Math.round(ht.reduce((a,b)=>a+b,0)/ht.length*10)/10:0,max=ht.length?Math.round(Math.max(...ht)*10)/10:0;
  finalStats={date:new Date().toISOString(),maxDepth:Math.round(gs.maxDepth),smallBreaths:gs.smallBreaths,bigBreaths:gs.bigBreaths,duration:dur,avgHold:avg,maxHold:max,timeLimit,milestones:[...gs.passed].sort((a,b)=>a-b),newRecord:gs.sightingDone,polarUsed:polar.connected};
  sessions=[...sessions,finalStats].slice(-30);saveS(sessions);prevBest=Math.max(...sessions.map(s=>s.maxDepth));
  Object.assign(gs,{active:false,holding:false,depth:0,maxDepth:0,pressure:0,holdStart:null,releaseStart:null,smallBreaths:0,bigBreaths:0,holdTimes:[],sessionStart:null,lastTs:null,ambient:[],bubbles:[],effects:[],texts:[],sightings:[],passed:new Set(),sightingDone:false});
  polarHoldState=false;screen="complete";renderComplete();
}

function btnS(sel){return`padding:10px 20px;border-radius:7px;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit;background:${sel?"rgba(74,138,181,0.22)":"transparent"};border:1px solid ${sel?"rgba(74,138,181,0.55)":"rgba(255,255,255,0.09)"};color:${sel?"#5a9ac5":"rgba(100,140,170,0.4)"};`;}

function renderScores(){
  screen="scores";const s=[...sessions].sort((a,b)=>b.maxDepth-a.maxDepth).slice(0,10);
  const recDepth=sessions.length?Math.max(...sessions.map(x=>x.maxDepth)):0,recHold=sessions.length?Math.max(...sessions.map(x=>x.maxHold||0)):0,recAvg=sessions.length?Math.max(...sessions.map(x=>x.avgHold||0)):0,recMil=sessions.length?Math.max(...sessions.map(x=>(x.milestones||[]).length)):0;
  const medalCol=i=>i===0?"#f0c040":i===1?"rgba(190,200,215,.9)":i===2?"#c87840":"rgba(60,100,140,.6)";const dot="\u00B7";
  const rows=s.length?s.map((x,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;background:${i===0?"rgba(240,192,64,.06)":"rgba(255,255,255,.02)"};border:1px solid ${i===0?"rgba(240,192,64,.15)":"rgba(255,255,255,.04)"};margin-bottom:6px;"><div style="width:22px;height:22px;border-radius:50%;background:${medalCol(i)};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:${i<3?"#06101e":"rgba(80,140,180,.9)"};flex-shrink:0;">${i+1}</div><div style="flex:1;min-width:0;"><div style="font-size:20px;font-weight:200;color:rgba(255,255,255,${i===0?.92:.72});">${x.maxDepth}m${x.newRecord?" \u2728":""}${x.polarUsed?" \u2665":""}</div><div style="font-size:10px;color:rgba(80,130,165,.85);margin-top:1px;">${fmtDate(x.date)} ${dot} hold ${x.maxHold}s ${dot} ${(x.milestones||[]).length} mijlpalen</div></div><div style="text-align:right;flex-shrink:0;font-size:11px;color:rgba(60,100,130,.6);">${Math.floor((x.timeLimit||300)/60)} min</div></div>`).join(""):`<div style="font-size:14px;color:rgba(40,80,110,.6);padding:24px 0;text-align:center;">Nog geen sessies.</div>`;
  root.innerHTML=`<div style="position:absolute;inset:0;background:linear-gradient(180deg,#04101e,#020810);display:flex;flex-direction:column;overflow:hidden;"><div style="padding:20px 20px 0;flex-shrink:0;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;"><button id="back-btn" style="background:transparent;border:none;color:rgba(74,138,181,.6);font-size:13px;letter-spacing:2px;cursor:pointer;font-family:inherit;padding:4px 0;text-transform:uppercase;">Terug</button><p style="font-size:10px;letter-spacing:5px;color:#1a3a52;text-transform:uppercase;">High Scores</p><div style="width:50px;"></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;">${[["Diepste duik",recDepth+"m","#4a8ab5"],["Langste hold",recHold+"s","#3ab585"],["Gem. hold record",recAvg+"s","#a060c0"],["Meeste mijlpalen",recMil,"#c08030"]].map(([l,v,c])=>`<div style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:10px 12px;"><div style="font-size:20px;font-weight:200;color:${c};">${v}</div><div style="font-size:9px;letter-spacing:1.5px;color:rgba(80,130,160,.75);margin-top:3px;text-transform:uppercase;">${l}</div></div>`).join("")}</div><div style="font-size:9px;letter-spacing:3px;color:#1a3a52;text-transform:uppercase;margin-bottom:10px;">Top sessies \u2014 diepste duik</div></div><div style="flex:1;overflow-y:auto;padding:0 20px 20px;">${rows}</div></div>`;
  document.getElementById("back-btn").addEventListener("click",()=>renderReady());
}

function renderReady(){
  screen="ready";const best=sessions.length?Math.max(...sessions.map(s=>s.maxDepth)):null,last=sessions.length?sessions[sessions.length-1]:null;
  root.innerHTML=`<div style="position:absolute;inset:0;background:linear-gradient(180deg,#06121f,#020910);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;"><p style="font-size:11px;letter-spacing:5px;color:#2a4a62;text-transform:uppercase;margin-bottom:12px;">Ademtraining</p><h1 style="font-size:52px;font-weight:100;color:rgba(255,255,255,.92);letter-spacing:3px;margin-bottom:8px;">The Diver</h1><p style="font-size:15px;color:#3a5878;line-height:1.9;margin-bottom:18px;">Adem volledig uit, houd vast om te dalen.<br>Eerste inademing om te stijgen.<br><span style="color:#223650;font-size:13px;">Er is iets te ontdekken onderweg.</span></p><p style="font-size:10px;letter-spacing:3px;color:#2a4a62;text-transform:uppercase;margin-bottom:9px;">Tijdslimiet</p><div style="display:flex;gap:10px;margin-bottom:16px;"><button data-t="5" style="${btnS(timeLimit===300)}">5 min</button><button data-t="10" style="${btnS(timeLimit===600)}">10 min</button></div><button id="polar-btn" style="padding:8px 18px;border-radius:7px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:inherit;background:transparent;border:1px solid rgba(74,138,181,.3);color:rgba(74,138,181,.5);margin-bottom:14px;"><span id="polar-lbl">Polar H10 verbinden</span><span id="polar-hr" style="margin-left:8px;font-size:10px;opacity:.7;"></span></button>${best!==null?`<div style="background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:11px 20px;display:flex;justify-content:space-between;align-items:center;width:100%;max-width:290px;margin-bottom:12px;"><div><div style="font-size:9px;letter-spacing:2px;color:#2a4a60;text-transform:uppercase;margin-bottom:2px;">Record</div><div style="font-size:26px;font-weight:100;color:#f0c040;">${best}m</div></div>${last?`<div style="text-align:right;"><div style="font-size:9px;letter-spacing:2px;color:#2a4a60;text-transform:uppercase;margin-bottom:2px;">Laatste</div><div style="font-size:26px;font-weight:100;color:rgba(255,255,255,.8);">${last.maxDepth}m</div></div>`:""}</div><button id="scores-btn" style="font-size:11px;letter-spacing:3px;color:rgba(74,138,181,.5);background:transparent;border:none;cursor:pointer;font-family:inherit;text-transform:uppercase;padding:5px 0;">Scores bekijken</button>`:`<div style="height:8px;"></div>`}</div>`;
  root.querySelectorAll("[data-t]").forEach(btn=>{btn.addEventListener("click",e=>{e.stopPropagation();timeLimit=parseInt(btn.dataset.t)*60;root.querySelectorAll("[data-t]").forEach(b=>{const s=b.dataset.t===btn.dataset.t;b.style.background=s?"rgba(74,138,181,0.22)":"transparent";b.style.borderColor=s?"rgba(74,138,181,0.55)":"rgba(255,255,255,0.09)";b.style.color=s?"#5a9ac5":"rgba(100,140,170,0.4)";});});});
  const sb=document.getElementById("scores-btn");if(sb)sb.addEventListener("click",e=>{e.stopPropagation();renderScores();});
  const pb=document.getElementById("polar-btn");
  if(pb){pb.addEventListener("mousedown",e=>{e.stopPropagation();e.preventDefault();});pb.addEventListener("touchstart",e=>{e.stopPropagation();e.preventDefault();},{passive:false});pb.addEventListener("click",e=>{e.stopPropagation();if(!polar.connected&&polar.status!=="connecting")connectPolar();});updatePolarUI();}
}

function renderPlaying(){
  root.innerHTML=`<canvas id="gc" style="position:absolute;inset:0;width:100%;height:100%"></canvas><div style="position:absolute;inset:0;pointer-events:none;"><div style="position:absolute;top:14px;left:0;right:0;text-align:center;"><div id="dn" style="font-size:min(100px,19vw);font-weight:100;color:rgba(255,255,255,.88);letter-spacing:-2px;line-height:1;">0</div><div style="font-size:13px;letter-spacing:6px;color:rgba(118,178,218,.3);margin-top:2px;">METER</div><div id="mx" style="font-size:13px;letter-spacing:2px;color:rgba(78,138,178,.28);margin-top:6px;">max 0m</div></div><div style="position:absolute;top:14px;right:18px;text-align:right;"><div id="tm" style="font-size:22px;font-weight:100;letter-spacing:1px;color:rgba(255,255,255,.28);">--:--</div><div style="font-size:9px;letter-spacing:2px;color:rgba(48,88,118,.28);margin-top:3px;text-transform:uppercase;">resterend</div></div>${polar.connected?`<div style="position:absolute;top:16px;left:14px;font-size:10px;color:rgba(38,200,130,.5);letter-spacing:1px;" id="polar-hr"></div>`:""}<div style="position:absolute;right:16px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;"><span id="pl" style="font-size:8px;letter-spacing:2px;color:rgba(68,128,168,.3);text-transform:uppercase;transition:color .8s ease;">drang</span><div style="width:4px;height:105px;background:rgba(255,255,255,.05);border-radius:2px;position:relative;overflow:hidden;"><div id="pf" style="position:absolute;bottom:0;left:0;right:0;border-radius:2px;height:0%;transition:height .08s linear;"></div></div></div><div id="sl" style="position:absolute;bottom:58px;left:0;right:0;text-align:center;font-size:13px;letter-spacing:4px;text-transform:uppercase;color:rgba(58,98,128,.38);transition:color .3s;"></div><button id="eb" style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 24px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:7px;color:rgba(98,158,194,.38);font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;pointer-events:all;font-family:inherit;">be&#235;indigen</button></div>`;
  document.getElementById("eb").addEventListener("mousedown",e=>e.stopPropagation());
  document.getElementById("eb").addEventListener("touchstart",e=>e.stopPropagation(),{passive:true});
  document.getElementById("eb").addEventListener("click",e=>{e.stopPropagation();endSession();});
}

function renderComplete(){
  if(!finalStats)return;const allByDepth=[...sessions].sort((a,b)=>b.maxDepth-a.maxDepth);const rank=allByDepth.findIndex(s=>s===finalStats)+1;const isRec=finalStats.newRecord||rank===1;const tot=finalStats.smallBreaths+finalStats.bigBreaths,sPct=tot?Math.round(finalStats.smallBreaths/tot*100):0;const rec=sessions.slice(-15),maxD=Math.max(...rec.map(s=>s.maxDepth),1);
  const msB=(finalStats.milestones||[]).map(d=>{const m=MS.find(x=>x.d===d);if(!m)return"";return`<span style="font-size:10px;padding:4px 9px;border-radius:4px;background:rgba(${m.c[0]},${m.c[1]},${m.c[2]},.13);color:rgba(${m.c[0]},${m.c[1]},${m.c[2]},.78);letter-spacing:1px;">${d}m</span>`;}).join("");
  const rankStr=isRec&&sessions.length>1?`<div style="font-size:12px;color:#f0c040;margin-top:8px;letter-spacing:2px;">\u2728 persoonlijk record</div>`:rank<=3&&sessions.length>1?`<div style="font-size:12px;color:#4a9ab5;margin-top:8px;letter-spacing:2px;">top ${rank} ooit</div>`:sessions.length>1?`<div style="font-size:11px;color:rgba(60,100,130,.5);margin-top:8px;letter-spacing:1px;">positie ${rank} van ${sessions.length}</div>`:"";
  root.innerHTML=`<div style="position:absolute;inset:0;background:linear-gradient(180deg,#040d1a,#020508);display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:28px 22px 22px;text-align:center;"><p style="font-size:11px;letter-spacing:5px;color:#2a4a62;text-transform:uppercase;margin-bottom:12px;">Sessie afgerond</p><div style="margin-bottom:20px;"><div style="font-size:80px;font-weight:100;color:rgba(255,255,255,.92);line-height:1;">${finalStats.maxDepth}</div><div style="font-size:12px;letter-spacing:4px;color:rgba(80,140,170,.8);margin-top:5px;">METER DIEPTE</div>${rankStr}</div>${(finalStats.milestones||[]).length?`<div style="width:100%;max-width:290px;margin-bottom:14px;"><div style="font-size:9px;letter-spacing:3px;color:#2a4a60;text-transform:uppercase;margin-bottom:8px;">Ontdekt</div><div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;">${msB}</div></div>`:""}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:290px;margin-bottom:12px;">${[["Duur",finalStats.duration+"s"],["Max. hold",finalStats.maxHold+"s"],["Gem. hold",finalStats.avgHold+"s"],["Kleine adem",sPct+"%"]].map(([l,v])=>`<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:8px;padding:10px 12px;"><div style="font-size:20px;font-weight:200;color:rgba(255,255,255,.85);">${v}</div><div style="font-size:9px;letter-spacing:1.5px;color:rgba(70,120,155,.8);">${l}</div></div>`).join("")}</div>${rec.length>=2?`<div style="width:100%;max-width:290px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <div style="font-size:9px;letter-spacing:3px;color:#2a4a60;text-transform:uppercase;">Progressie</div>
        <div style="font-size:9px;color:rgba(60,100,130,.55);">max diepte · ${rec.length} sessies</div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:3px;height:40px;">${rec.map((s,i)=>{const bh=Math.max((s.maxDepth/maxD)*36,3),il=i===rec.length-1;const op=0.28+(i/rec.length)*0.52;return`<div title="${s.maxDepth}m" style="flex:1;height:${bh}px;border-radius:2px 2px 0 0;background:${il?(isRec?"#f0c040":"#4a8ab5"):`rgba(74,138,181,${op})`};"></div>`;}).join("")}</div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;">
        <div style="font-size:9px;color:rgba(60,100,130,.45);">oudst</div>
        <div style="font-size:9px;color:rgba(100,170,220,.7);font-weight:500;">${rec[rec.length-1].maxDepth}m vandaag</div>
      </div>
    </div>`:""}<div style="display:flex;gap:10px;width:100%;max-width:290px;"><button id="scores-btn2" style="flex:1;padding:12px;background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2);border-radius:8px;color:rgba(240,192,64,.7);font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;font-family:inherit;">Scores</button><button id="nsb" style="flex:2;padding:12px;background:transparent;border:1px solid rgba(74,138,181,.32);border-radius:8px;color:#4a8ab5;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;font-family:inherit;">Nieuwe sessie</button></div></div>`;
  document.getElementById("nsb").addEventListener("click",()=>{finalStats=null;renderReady();});
  document.getElementById("scores-btn2").addEventListener("click",()=>{finalStats=null;renderScores();});
}

function shouldBlock(e){if(screen==="scores")return true;let el=e.target;while(el&&el!==root){if(el.id&&UI_IDS.includes(el.id))return true;if(el.dataset&&el.dataset.t)return true;el=el.parentElement;}return false;}
function manualOK(){return true;} // touch always works; Polar adds auto-detection on top

root.addEventListener("touchstart",e=>{if(shouldBlock(e)||screen==="calibrating")return;e.preventDefault();if(manualOK())startHold();},{passive:false});
root.addEventListener("touchend",  e=>{if(shouldBlock(e)||screen==="calibrating")return;e.preventDefault();if(manualOK())endHold();},{passive:false});
root.addEventListener("mousedown",e=>{if(shouldBlock(e))return;if(manualOK())startHold();});
root.addEventListener("mouseup",  ()=>{if(screen!=="scores"&&manualOK())endHold();});
root.addEventListener("mouseleave",()=>{if(screen!=="scores"&&manualOK())endHold();});
document.addEventListener("keydown",e=>{if(e.code==="Space"&&!e.repeat&&screen!=="scores"){e.preventDefault();if(manualOK())startHold();}});
document.addEventListener("keyup",  e=>{if(e.code==="Space"&&screen!=="scores"){e.preventDefault();if(manualOK())endHold();}});
window.addEventListener("resize",()=>{const c=document.getElementById("gc");if(c&&gs.active){c.width=c.offsetWidth;c.height=c.offsetHeight;}});
renderReady();
</script>
</body>
</html>
